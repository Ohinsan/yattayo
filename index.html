<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やったよ V2</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <!-- Setup Screen -->
    <div id="setup-screen" class="container hidden">
        <div class="app-wrapper">
            <div class="header">
                <h1 class="title">🏠 部屋の設定</h1>
                <p class="subtitle">おうちの間取りを選んでください</p>
            </div>
            
            <div class="template-grid">
                <div class="template-card" onclick="selectTemplate('1LDK')">
                    <div class="template-icon">🛋️</div>
                    <h3 class="template-name">1LDK</h3>
                    <p class="template-desc">リビング・キッチン・お風呂・トイレ・ごみ捨て</p>
                </div>
                <div class="template-card" onclick="selectTemplate('2LDK')">
                    <div class="template-icon">🛏️</div>
                    <h3 class="template-name">2LDK</h3>
                    <p class="template-desc">1LDK ＋ 寝室・自由な部屋・洗面所</p>
                </div>
                <div class="template-card" onclick="selectTemplate('3LDK+')">
                    <div class="template-icon">🏠</div>
                    <h3 class="template-name">3LDK以上</h3>
                    <p class="template-desc">2LDK ＋ 追加の部屋1・追加の部屋2</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="container hidden">
        <div class="app-wrapper">
            <!-- Header -->
            <div class="header">
                <div class="header-top">
                    <h1 class="title">✅ やったよ</h1>
                    <button class="btn-settings" onclick="changeLayoutSettings()" title="部屋の設定を変更">⚙️</button>
                </div>
                <p class="subtitle">やった家事をワンタップで記録しよう</p>
            </div>

            <!-- Chore Addition Area (Dynamic) -->
            <div id="quick-add-container">
                <!-- Buttons will be generated here -->
            </div>

            <!-- Free Input Area -->
            <div class="chore-addition-card">
                <!-- Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">✏️ 物品補充（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="freeSupplyInput" placeholder="例）トイレットペーパー..."
                            onkeypress="if(event.key==='Enter') addFreeSupply()">
                        <button class="btn btn-add-supply" onclick="addFreeSupply()">➕ 追加</button>
                    </div>
                </div>

                <!-- Other Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">📝 その他（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="otherChoreInput" placeholder="例）窓拭き、アイロンがけ..."
                            onkeypress="if(event.key==='Enter') addOtherChore()">
                        <button class="btn btn-add-other" onclick="addOtherChore()">➕ 追加</button>
                    </div>
                </div>
            </div>

            <!-- Completed History -->
            <div class="card completed-card">
                <h2 class="card-title">📝 最近やったこと</h2>
                <div id="completedList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Share Section -->
            <div class="card share-card">
                <h2 class="card-title">📱 家族にシェア</h2>
                <div class="share-input-group">
                    <label for="shareMessage" class="group-label">家族への伝言・お願い（任意）</label>
                    <textarea id="shareMessage" placeholder="例：お風呂掃除ありがとう！トイレットペーパー買ってきたよ。" rows="3"></textarea>
                </div>
                <button class="btn-share" onclick="shareReport()">
                    <span>📱 LINE等でシェアする</span>
                </button>
            </div>

            <!-- Reset Button -->
            <button class="btn btn-reset" onclick="resetDay()">🔄 1日をリセット</button>

            <!-- Footer -->
            <div class="footer">
                <p id="current-layout-display"></p>
                <p>💾 データはブラウザに自動保存されます</p>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="image-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 class="modal-title">📸 画像が生成されました！</h3>
            <p class="modal-desc">上記の画像を長押しして保存・コピーしてLINEに貼ってね！</p>
            <div class="modal-image-container">
                <img id="modal-image" src="" alt="家事レポート">
            </div>
            <button class="btn btn-close-modal" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
