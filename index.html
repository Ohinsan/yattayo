<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家事分担アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="app-wrapper">
            <!-- Header -->
            <div class="header">
                <h1 class="title">🏠 家事分担アプリ</h1>
                <p class="subtitle">今日の家事をスムーズに分け合おう</p>
            </div>

            <!-- Name Settings -->
            <div class="name-settings-card">
                <div id="nameDisplay" class="name-display">
                    <div class="name-badges">
                        <div class="badge badge-a" id="nameBadgeA">自分</div>
                        <div class="badge badge-b" id="nameBadgeB">家族</div>
                    </div>
                    <button class="btn-edit-name" onclick="toggleNameEdit()">✏️ 名前を変更</button>
                </div>
                <div id="nameEdit" class="name-edit hidden">
                    <div class="form-group">
                        <label for="nameAInput">ユーザーA の名前:</label>
                        <input type="text" id="nameAInput" value="自分" placeholder="名前を入力">
                    </div>
                    <div class="form-group">
                        <label for="nameBInput">ユーザーB の名前:</label>
                        <input type="text" id="nameBInput" value="家族" placeholder="名前を入力">
                    </div>
                    <div class="button-group">
                        <button class="btn btn-save" onclick="saveNames()">保存</button>
                        <button class="btn btn-cancel" onclick="toggleNameEdit()">キャンセル</button>
                    </div>
                </div>
            </div>

            <!-- Pending Chores -->
            <div class="card pending-card">
                <h2 class="card-title">📋 未完了の家事</h2>
                <div id="pendingChoresList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
                <div class="add-chore-section">
                    <label for="newChoreInput">新しい家事を追加:</label>
                    <div class="add-chore-input-group">
                        <input type="text" id="newChoreInput" placeholder="例）アイロン掛け、カーテン洗い..."
                            onkeypress="if(event.key==='Enter') addChore()">
                        <button class="btn btn-add" onclick="addChore()">➕ 追加</button>
                    </div>
                </div>
            </div>

            <!-- Completed by User A -->
            <div class="card completed-card-a">
                <h2 class="card-title">✅ <span id="nameA">自分</span>がやったこと</h2>
                <div id="completedAList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Completed by User B -->
            <div class="card completed-card-b">
                <h2 class="card-title">✅ <span id="nameB">家族</span>がやったこと</h2>
                <div id="completedBList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Reset Button -->
            <button class="btn btn-reset" onclick="resetDay()">🔄 1日をリセット</button>

            <!-- Footer -->
            <div class="footer">
                <p>💾 データはブラウザに自動保存されます</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
