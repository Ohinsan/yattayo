<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やったよ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="app-wrapper">
            <!-- Header -->
            <div class="header">
                <h1 class="title">✅ やったよ</h1>
                <p class="subtitle">やった家事をワンタップで記録しよう</p>
            </div>

            <!-- Chore Addition Area -->
            <div class="chore-addition-card">
                <!-- Quick Add Buttons -->
                <div class="quick-add-section">
                    <h3 class="section-title">📌 やった家事をタップ</h3>

                    <!-- Living Room -->
                    <div class="quick-add-group">
                        <div class="group-label">リビング</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-living-vacuum"
                                onclick="addQuickChore('リビング：掃除機がけ', this)">掃除機がけ</button>
                            <button class="quick-add-btn" id="btn-living-quickle"
                                onclick="addQuickChore('リビング：クイックルワイパー', this)">クイックルワイパー</button>
                            <button class="quick-add-btn" id="btn-living-roller"
                                onclick="addQuickChore('リビング：カーペットころころ', this)">カーペットころころ</button>
                        </div>
                    </div>

                    <!-- Bedroom -->
                    <div class="quick-add-group">
                        <div class="group-label">寝室</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-bedroom-vacuum"
                                onclick="addQuickChore('寝室：掃除機がけ', this)">掃除機がけ</button>
                            <button class="quick-add-btn" id="btn-bedroom-quickle"
                                onclick="addQuickChore('寝室：クイックルワイパー', this)">クイックルワイパー</button>
                        </div>
                    </div>

                    <!-- Any Room -->
                    <div class="quick-add-group">
                        <div class="group-label">自由な部屋</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-any-vacuum"
                                onclick="addQuickChore('自由な部屋：掃除機がけ', this)">掃除機がけ</button>
                            <button class="quick-add-btn" id="btn-any-quickle"
                                onclick="addQuickChore('自由な部屋：クイックルワイパー', this)">クイックルワイパー</button>
                        </div>
                    </div>

                    <!-- Kitchen -->
                    <div class="quick-add-group">
                        <div class="group-label">キッチン</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-kitchen-sink"
                                onclick="addQuickChore('キッチン：シンクの掃除', this)">シンクの掃除</button>
                            <button class="quick-add-btn" id="btn-kitchen-stove"
                                onclick="addQuickChore('キッチン：コンロの掃除', this)">コンロの掃除</button>
                            <button class="quick-add-btn" id="btn-kitchen-towel"
                                onclick="addQuickChore('キッチン：タオル交換', this)">タオル交換</button>
                        </div>
                    </div>

                    <!-- Bathroom -->
                    <div class="quick-add-group">
                        <div class="group-label">お風呂</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-bath-clean"
                                onclick="addQuickChore('お風呂：浴槽・浴室の掃除', this)">浴槽・浴室の掃除</button>
                            <button class="quick-add-btn" id="btn-bath-towel"
                                onclick="addQuickChore('お風呂:タオル交換', this)">タオル交換</button>
                        </div>
                    </div>

                    <!-- Washroom -->
                    <div class="quick-add-group">
                        <div class="group-label">洗面所</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-washroom-clean"
                                onclick="addQuickChore('洗面所：洗面台の掃除', this)">洗面台の掃除</button>
                            <button class="quick-add-btn" id="btn-washroom-towel"
                                onclick="addQuickChore('洗面所：タオル交換', this)">タオル交換</button>
                        </div>
                    </div>

                    <!-- Toilet -->
                    <div class="quick-add-group">
                        <div class="group-label">トイレ</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-toilet-clean"
                                onclick="addQuickChore('トイレ：トイレ掃除', this)">トイレ掃除</button>
                        </div>
                    </div>

                    <!-- Garbage -->
                    <div class="quick-add-group">
                        <div class="group-label">ごみ捨て</div>
                        <div class="quick-add-buttons">
                            <button class="quick-add-btn" id="btn-garbage"
                                onclick="addQuickChore('ごみ捨て', this)">ごみ捨て</button>
                        </div>
                    </div>
                </div>

                <!-- Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">✏️ 物品補充（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="freeSupplyInput" placeholder="例）トイレットペーパー、ティッシュペーパー..."
                            onkeypress="if(event.key==='Enter') addFreeSupply()">
                        <button class="btn btn-add-supply" onclick="addFreeSupply()">➕ 追加</button>
                    </div>
                </div>

                <!-- Other Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">📝 その他（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="otherChoreInput" placeholder="例）布団干し、窓拭き、アイロンがけ..."
                            onkeypress="if(event.key==='Enter') addOtherChore()">
                        <button class="btn btn-add-other" onclick="addOtherChore()">➕ 追加</button>
                    </div>
                </div>
            </div>

            <!-- Completed History -->
            <div class="card completed-card">
                <h2 class="card-title">📝 最近やったこと</h2>
                <div id="completedList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Reset Button -->
            <button class="btn btn-reset" onclick="resetDay()">🔄 1日をリセット</button>

            <!-- Footer -->
            <div class="footer">
                <p>💾 データはブラウザに自動保存されます</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
