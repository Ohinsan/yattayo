<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やったよ V2 - Ultimate Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Setup Screen (3-Step UI) -->
    <div id="setup-screen" class="container hidden">
        <div class="app-wrapper" style="margin-top: 3rem;">
            <div class="header">
                <h1 class="title">🏠 家事記録の設定</h1>
                <p class="subtitle">おうちのタイプを選択してください</p>
            </div>
            
            <div class="setup-card">
                <!-- STEP 1: 間取りの選択 -->
                <h3 class="setup-section-title">間取りを選択してください</h3>
                <div class="setup-grid">
                    <button class="setup-btn-select" id="setup-1ldk" onclick="setSetupLayout('1LDK')">1LDK</button>
                    <button class="setup-btn-select" id="setup-2ldk" onclick="setSetupLayout('2LDK')">2LDK</button>
                    <button class="setup-btn-select" id="setup-3ldk" onclick="setSetupLayout('3LDK+')">3LDK+</button>
                </div>

                <!-- STEP 2: フロア数の選択 -->
                <h3 class="setup-section-title">フロア数を選択してください</h3>
                <div class="setup-grid">
                    <button class="setup-btn-select" id="setup-floor1" onclick="setSetupFloors(1)">1フロア</button>
                    <button class="setup-btn-select" id="setup-floor2" onclick="setSetupFloors(2)">2フロア</button>
                    <button class="setup-btn-select" id="setup-floor3" onclick="setSetupFloors(3)">3フロア</button>
                </div>

                <!-- STEP 3: 家事をやる人数 -->
                <h3 class="setup-section-title">家事をやる人数を選択してください</h3>
                <div class="setup-grid">
                    <button class="setup-btn-select" id="setup-player1" onclick="setSetupPlayers(1)">1人</button>
                    <button class="setup-btn-select" id="setup-player2" onclick="setSetupPlayers(2)">2人</button>
                    <button class="setup-btn-select" id="setup-player3" onclick="setSetupPlayers(3)">3人以上</button>
                </div>

                <button class="setup-btn-submit" onclick="submitSetup()">家事記録を開始する</button>
            </div>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="container hidden">
        <div class="app-wrapper">
            <!-- Header -->
            <div class="header">
                <div class="header-top">
                    <h1 class="title">✅ やったよ</h1>
                    <button class="btn-settings" onclick="openSettingsModal()" title="設定を変更">⚙️</button>
                </div>
                <p class="subtitle">やった家事をワンタップで記録しよう</p>
                
                <!-- 👾 相棒表示（絵文字2つで属性を可視化！カプセル型の美しいバッジに絵文字だけを常時浮遊） -->
                <div id="companion-status-widget">
                    <!-- JSで動的生成 -->
                </div>

                <!-- ⭐今日のラッキー家事 -->
                <div id="lucky-chore-widget" style="margin-top: 0.5rem;">
                    <!-- JSで動的生成 -->
                </div>
            </div>

            <!-- Chore Addition Area (Dynamic) -->
            <div id="quick-add-container">
                <!-- Buttons will be generated here -->
            </div>

            <!-- Free Input Area -->
            <div class="chore-addition-card">
                <!-- Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">✏️ 物品補充（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="freeSupplyInput" placeholder="例）トイレットペーパー..."
                            onkeypress="if(event.key==='Enter') addFreeSupply()">
                        <button class="btn btn-add-supply" onclick="addFreeSupply()">➕ 追加</button>
                    </div>
                </div>

                <!-- Other Free Input Section -->
                <div class="free-input-section">
                    <h3 class="section-title">📝 その他（自由記述）</h3>
                    <div class="free-input-group">
                        <input type="text" id="otherChoreInput" placeholder="例）窓拭き、アイロンがけ..."
                            onkeypress="if(event.key==='Enter') addOtherChore()">
                        <button class="btn btn-add-other" onclick="addOtherChore()">➕ 追加</button>
                    </div>
                </div>
            </div>

            <!-- Completed History -->
            <div class="card completed-card">
                <h2 class="card-title">📝 最近やったこと</h2>
                <div id="completedList" class="chores-list">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Share Section -->
            <div class="card share-card">
                <h2 class="card-title">📱 家族にシェア</h2>
                <div class="share-input-group">
                    <label for="shareMessage" class="group-label">家族への伝言・お願い（任意）</label>
                    <textarea id="shareMessage" placeholder="例：お風呂掃除ありがとう！トイレットペーパー買ってきたよ。" rows="3"></textarea>
                </div>
                <button class="btn-share" onclick="shareReport()">
                    <span>📱 LINE等でシェアする</span>
                </button>
            </div>

            <!-- 2-Type Reset Buttons -->
            <div class="reset-buttons-container">
                <button class="btn-reset-light" onclick="resetDayOnly()">🧹 本日の記録を整理する</button>
                <button class="btn-reset-full" onclick="resetAppFully()">🔄 アプリの設定とデータを完全初期化する</button>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p id="current-layout-display"></p>
                <p class="footer-stealth-trigger" onclick="openSpellModal()">💾 データはブラウザに自動保存されます</p>
            </div>
        </div>
    </div>

    <!-- 🔒 ギア設定モーダル (In-app Setup & Room Customization) -->
    <div id="settings-modal" class="spell-overlay hidden">
        <div class="spell-content" style="max-width: 500px;">
            <h3 class="spell-title">⚙️ 家事記録の設定</h3>
            <p class="spell-desc">間取りやフロア数、各部屋の呼び名をカスタマイズできます。</p>
            
            <!-- Settings Form -->
            <div class="settings-input-group">
                <label>おうちの間取り</label>
                <select id="settings-layout-select" onchange="onSettingsLayoutChange()">
                    <option value="1LDK">1LDK</option>
                    <option value="2LDK">2LDK</option>
                    <option value="3LDK+">3LDK以上</option>
                </select>
            </div>

            <div class="settings-input-group">
                <label>フロア数</label>
                <select id="settings-floor-select">
                    <option value="1">1フロア</option>
                    <option value="2">2フロア</option>
                    <option value="3">3フロア</option>
                </select>
            </div>

            <div class="settings-input-group">
                <label>家事をやる人数</label>
                <select id="settings-players-select">
                    <option value="1">1人</option>
                    <option value="2">2人</option>
                    <option value="3">3人以上</option>
                </select>
            </div>

            <h4 style="font-size: 12px; font-weight: 700; color: var(--text-sub); text-align: left; margin-bottom: 0.5rem;">お部屋の名前のカスタマイズ</h4>
            <div id="settings-room-names-container" class="settings-scroll-area">
                <!-- Custom room name inputs will be generated here dynamically -->
            </div>

            <div class="spell-btn-group">
                <button class="btn-spell-action btn-spell-cancel" onclick="closeSettingsModal()">キャンセル</button>
                <button class="btn-spell-action btn-spell-cast" onclick="saveSettings()">保存して反映</button>
            </div>
        </div>
    </div>

    <!-- 🔒 おうちの同期コードモーダル (Stealth Backup UI) -->
    <div id="spell-modal" class="spell-overlay hidden">
        <div class="spell-content">
            <h3 class="spell-title">💾 バックアップデータの復元</h3>
            <p class="spell-desc">別の端末や過去の記録（同期用バックアップキー）を入力して同期します。</p>
            <input type="text" id="spellInput" class="spell-input" placeholder="KJ-LVx-Fxx-Wxx-Axx-Exx">
            <div class="spell-btn-group">
                <button class="btn-spell-action btn-spell-cancel" onclick="closeSpellModal()">キャンセル</button>
                <button class="btn-spell-action btn-spell-cast" onclick="castSpell()">同期する</button>
            </div>
        </div>
    </div>

    <!-- 💫 召喚カットイン演出 -->
    <div id="cutin-container" class="cutin-container hidden">
        <div class="cutin-magic-circle"></div>
        <div id="cutin-box" class="cutin-box">
            <!-- Dynamic Content -->
            <div id="cutin-emoji" class="cutin-emoji">🥚</div>
        </div>
    </div>

    <!-- 🏆 感動の表彰エンディング画面 (高精細ドラゴン画像ドン！出現) -->
    <div id="ending-modal" class="ending-overlay hidden">
        <div class="ending-content">
            <div class="ending-trophy">🏆</div>
            <div>
                <h2 class="ending-title" id="ending-celebration-title">よく頑張りました！</h2>
            </div>
            
            <!-- 表彰時にドン！と表示されるドラゴンの画像 -->
            <div class="ending-image-container">
                <img id="ending-dragon-image" src="" alt="おうちの守護精霊">
            </div>

            <div class="ending-scroll-text" id="ending-scroll-content">
                <!-- JSで動的にメッセージを生成 -->
            </div>
            <button class="btn-ending-close" onclick="closeEndingModal()">記録に戻る</button>
        </div>
    </div>

    <!-- JavaScript Region -->
    <script src="script.js"></script>
</body>

</html>
